services:
  qgis-server:
    build:
      context: ./qgis-server
      dockerfile: Dockerfile
    # This substitute the https://github.com/krallin/tini inside the Dockerfile.
    init: true
    volumes:
      - ./example-projects:/data:ro
    environment:
      LANG: en_EN.UTF-8
      # This is the default project to serve, if it so not set the project must be specified by the MAP query param
      # https://docs.qgis.org/3.44/en/docs/server_manual/services/basics.html#map
      QGIS_PROJECT_FILE: /data/world.qgs
      QGIS_SERVER_LOG_LEVEL: 0 # INFO (log all requests)
      DEBUG: 1
  nginx:
    image: nginx:alpine
    ports:
      - 8080:80
    volumes:
      - ./qgis-server/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - qgis-server
